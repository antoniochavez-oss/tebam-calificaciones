<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEBAM Digital — Nueva Contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <style>
    :root { --gd:#1a2010;--gm:#2e3618;--gl:#404d20;--y:#f1e640;--gr:#7a8560;--grl:#b8c49a;--w:#edeee8;--ok:#72c96f;--err:#e05a4e; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--gd); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: linear-gradient(160deg, var(--gl), var(--gm)); border: 1px solid rgba(241,230,64,.18); border-radius: 20px; padding: 38px 34px; width: 100%; max-width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
    .brand { font-size: 10px; letter-spacing: .14em; color: var(--gr); text-transform: uppercase; margin-bottom: 5px; }
    h1 { font-size: 24px; font-weight: 700; color: var(--y); margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--grl); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--grl); margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase; }
    input { width: 100%; padding: 11px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,.1); background: rgba(0,0,0,.25); color: var(--w); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: .15s; }
    input:focus { border-color: var(--y); }
    .btn { width: 100%; padding: 13px; background: var(--y); color: var(--gd); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: .15s; }
    .btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .msg { border-radius: 9px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .msg.show { display: block; }
    .msg-ok  { background: rgba(114,201,111,.12); color: var(--ok);  border: 1px solid rgba(114,201,111,.25); }
    .msg-err { background: rgba(224,90,78,.12);   color: var(--err); border: 1px solid rgba(224,90,78,.25); }
    .strength { margin-top: 6px; }
    .strength-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,.1); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: .3s; }
    .strength-txt { font-size: 11px; color: var(--gr); margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Telebachillerato de Michoacán</div>
  <h1>Nueva Contraseña</h1>
  <p class="sub">Ingresa tu nueva contraseña para recuperar el acceso a TEBAM Digital.</p>

  <div class="msg msg-ok"  id="msgOk"></div>
  <div class="msg msg-err" id="msgErr"></div>

  <div class="field">
    <label>Nueva contraseña</label>
    <input type="password" id="pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
    <div class="strength">
      <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
      <div class="strength-txt" id="sTxt"></div>
    </div>
  </div>
  <div class="field">
    <label>Confirmar contraseña</label>
    <input type="password" id="conf" placeholder="Repite la contraseña" autocomplete="new-password"/>
  </div>

  <button class="btn" id="btn" onclick="cambiarPassword()">Guardar Nueva Contraseña</button>
</div>

<script>
  /* Indicador de fortaleza */
  document.getElementById('pass').addEventListener('input', () => {
    const v = document.getElementById('pass').value;
    let s = 0;
    if (v.length >= 8) s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    s = Math.min(s, 4);
    const cols  = ['#e05a4e','#e05a4e','#f1e640','#f1e640','#72c96f'];
    const texts = ['Muy débil','Débil','Regular','Buena','Fuerte ✓'];
    document.getElementById('sFill').style.cssText = `width:${(s/4)*100}%;background:${cols[s]}`;
    document.getElementById('sTxt').textContent = v.length ? texts[s] : '';
  });

  async function cambiarPassword() {
    const pass = document.getElementById('pass').value;
    const conf = document.getElementById('conf').value;
    const btn  = document.getElementById('btn');

    document.getElementById('msgOk').classList.remove('show');
    document.getElementById('msgErr').classList.remove('show');

    if (pass.length < 8) { showMsg('La contraseña debe tener al menos 8 caracteres', 'err'); return; }
    if (pass !== conf)   { showMsg('Las contraseñas no coinciden', 'err'); return; }

    btn.disabled = true; btn.textContent = 'Guardando…';

    const { error } = await sb.auth.updateUser({ password: pass });

    if (error) {
      showMsg('Error: ' + error.message, 'err');
      btn.disabled = false; btn.textContent = 'Guardar Nueva Contraseña';
      return;
    }

    showMsg('✓ Contraseña actualizada correctamente. Redirigiendo…', 'ok');

    // Redirigir al portal correcto
    setTimeout(async () => {
      const { data: { user } } = await sb.auth.getUser();
      const { data: p } = await sb.from('perfiles').select('rol').eq('id', user.id).single();
      const portales = { docente:'../pages/docente.html', alumno:'../pages/alumno.html', padre:'../pages/padre.html', admin:'../pages/docente.html' };
      location.href = portales[p?.rol] || '../login.html';
    }, 1500);
  }

  function showMsg(msg, tipo) {
    const el = document.getElementById('msg' + (tipo === 'ok' ? 'Ok' : 'Err'));
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
